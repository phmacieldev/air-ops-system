# ── Production profile (Render + Supabase) ───────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=prod

# Disable Spring Boot's docker-compose auto-start (not available on Render)
spring.docker.compose.enabled=false

# Database — Supabase JDBC URL (must include ?sslmode=require)
# Format: jdbc:postgresql://db.[ref].supabase.co:5432/postgres?sslmode=require
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD}

# Reduce noise in production logs
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
