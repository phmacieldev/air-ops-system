# ── Database ──────────────────────────────────────────────────────────────
# Local dev: DATABASE_URL não definida → usa localhost (docker-compose sobe o banco)
# Produção:  DATABASE_URL definida no Render → usa Supabase
spring.datasource.url=jdbc:postgresql://localhost:5432/air_ops
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:1234}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.docker.compose.enabled=false

# ── Security ──────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:air-ops-system-local-dev-secret-1234567890}

# ── CORS ──────────────────────────────────────────────────────────────────
cors.allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}

# ── Discord ───────────────────────────────────────────────────────────────
discord.webhook.reports=${DISCORD_WEBHOOK_REPORTS:}

# ── Flyway ────────────────────────────────────────────────────────────────
# baseline-on-migrate: schema já existe, Flyway marca como v0 na primeira run
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ── Server ────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
